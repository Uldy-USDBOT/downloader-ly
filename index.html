<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOWNLOADER.LY - For Sale</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier New', 'Monaco', monospace;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .code-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            font-size: 8px;
            line-height: 1.4;
            opacity: 0.12;
            overflow: hidden;
            color: #00ff41;
            white-space: pre;
            padding: 5px;
        }

        .line-numbers {
            position: fixed;
            left: 0;
            top: 0;
            width: 25px;
            height: 100%;
            background: rgba(0, 20, 0, 0.5);
            border-right: 1px solid #003300;
            z-index: 5;
            padding-top: 5px;
            text-align: right;
            padding-right: 5px;
            font-size: 8px;
            color: #004400;
            pointer-events: none;
        }

        .instruction {
            position: fixed;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            font-size: 9px;
            color: #00ff41;
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid #00ff41;
            padding: 5px 10px;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .instruction::before {
            content: '// ';
            color: #888;
        }

        .controls {
            position: fixed;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 5px;
            background: rgba(0, 10, 0, 0.9);
            border: 1px solid #00ff41;
            padding: 6px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95vw;
        }

        .mode-btn {
            background: #001100;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 5px 8px;
            font-family: 'Courier New', monospace;
            font-size: 9px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        .mode-btn::before {
            content: '> ';
            color: #ff6b35;
        }

        .mode-btn:hover {
            background: #002200;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.5);
        }

        .mode-btn.active {
            background: #003300;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.7);
            border-color: #fff;
        }

        .mode-btn.active::after {
            content: ' [*]';
            color: #ff6b35;
            font-size: 8px;
        }

        .domain-banner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            background: rgba(0, 20, 0, 0.95);
            border: 1px solid #00ff41;
            padding: 15px 20px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3), inset 0 0 20px rgba(0, 255, 65, 0.1);
            width: 90%;
            max-width: 320px;
        }

        .domain-banner::before {
            content: '<!-- SALE -->';
            position: absolute;
            top: -14px;
            left: 10px;
            color: #00ff41;
            font-size: 8px;
            background: #0a0a0a;
            padding: 0 5px;
        }

        .domain-banner::after {
            content: '<!-- END -->';
            position: absolute;
            bottom: -14px;
            right: 10px;
            color: #00ff41;
            font-size: 8px;
            background: #0a0a0a;
            padding: 0 5px;
        }

        .domain-name {
            font-size: 22px;
            font-weight: bold;
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41, 0 0 20px #00ff41;
            letter-spacing: 2px;
            margin-bottom: 5px;
            animation: glitch 3s infinite;
        }

        .for-sale-text {
            font-size: 12px;
            color: #ff6b35;
            text-shadow: 0 0 5px #ff6b35;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .contact-info {
            border-top: 1px solid #003300;
            padding-top: 10px;
            margin-top: 10px;
        }

        .contact-label {
            font-size: 9px;
            color: #666;
            margin-bottom: 8px;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #25d366;
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.4);
        }

        .whatsapp-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(37, 211, 102, 0.7);
        }

        .whatsapp-btn svg {
            width: 16px;
            height: 16px;
            fill: #fff;
        }

        .current-mode {
            position: fixed;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-size: 9px;
            color: #00ff41;
            background: rgba(0, 10, 0, 0.9);
            border: 1px solid #00ff41;
            padding: 4px 12px;
            white-space: nowrap;
        }

        .current-mode::before {
            content: 'status: ';
            color: #888;
        }

        .mode-label {
            color: #ff6b35;
            font-weight: bold;
        }

        .cursor {
            display: inline-block;
            width: 6px;
            height: 12px;
            background: #00ff41;
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-right: 3px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @keyframes glitch {
            0%, 90%, 100% { transform: translate(0); }
            91% { transform: translate(-1px, 0.5px); }
            92% { transform: translate(1px, -0.5px); }
            93% { transform: translate(-0.5px, 1px); }
            94% { transform: translate(0.5px, -1px); }
            95% { transform: translate(0); }
        }

        /* Mobile optimizations */
        @media (max-width: 480px) {
            .domain-name {
                font-size: 18px;
            }
            .for-sale-text {
                font-size: 10px;
            }
            .whatsapp-btn {
                padding: 6px 12px;
                font-size: 11px;
            }
            .mode-btn {
                font-size: 8px;
                padding: 4px 6px;
            }
            .controls {
                padding: 4px;
                gap: 3px;
            }
        }
    </style>

    <div class="current-mode">
        <span class="mode-label" id="modeLabel">matrix()</span>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const modeLabel = document.getElementById('modeLabel');
        const buttons = document.querySelectorAll('.mode-btn');
        const codeOverlay = document.getElementById('codeOverlay');
        const lineNumbers = document.getElementById('lineNumbers');

        let currentMode = 'matrix';
        let mouseX = 0;
        let mouseY = 0;
        let time = 0;

        const codeSnippets = [
            'function init() {',
            '  const config = {',
            '    domain: "DOWNLOADER.LY",',
            '    status: "FOR_SALE",',
            '    contact: "wa.me"',
            '  };',
            '  return config;',
            '}',
            '',
            'class DomainSale {',
            '  constructor() {',
            '    this.price = "NEGOTIABLE";',
            '    this.currency = "USD";',
            '  }',
            '',
            '  contact() {',
            '    return this.whatsapp;',
            '  }',
            '}',
            '',
            'const download = new Downloader();',
            'download.domain = "DOWNLOADER.LY";',
            'download.available = true;',
            '',
            'if (interested) {',
            '  contact("wa.me");',
            '}',
            '',
            '// Premium domain',
            '// Libya TLD',
            '',
            'module.exports = {',
            '  domain: "DOWNLOADER.LY",',
            '  forSale: true',
            '};'
        ];

        function generateCodeOverlay() {
            let html = '';
            for (let i = 0; i < 150; i++) {
                const snippet = codeSnippets[i % codeSnippets.length];
                const indent = '  '.repeat(Math.floor(Math.random() * 4));
                html += `${indent}${snippet}\n`;
            }
            codeOverlay.textContent = html;
        }
        generateCodeOverlay();

        function generateLineNumbers() {
            let html = '';
            for (let i = 1; i <= 150; i++) {
                html += `${i}\n`;
            }
            lineNumbers.textContent = html;
        }
        generateLineNumbers();

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;

                const modeNames = {
                    'matrix': 'matrix()',
                    'energy': 'energy()',
                    'data': 'stream()'
                };
                modeLabel.textContent = modeNames[currentMode];
            });
        });

        class MatrixMode {
            constructor() {
                this.columns = [];
                this.init();
            }

            init() {
                const colCount = Math.floor(canvas.width / 15);
                this.columns = [];
                for (let i = 0; i < colCount; i++) {
                    this.columns.push({
                        x: i * 15,
                        y: Math.random() * canvas.height,
                        speed: 1 + Math.random() * 3,
                        chars: [],
                        length: 8 + Math.random() * 15
                    });
                }
            }

            getChar() {
                const chars = '01<>/=;{}[]()#@$%&*';
                return chars[Math.floor(Math.random() * chars.length)];
            }

            draw() {
                ctx.fillStyle = 'rgba(10, 10, 10, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const rotX = (mouseY - canvas.height / 2) * 0.001;
                const rotY = (mouseX - canvas.width / 2) * 0.001;

                this.columns.forEach((col, idx) => {
                    col.y += col.speed;
                    if (col.y > canvas.height + 50) {
                        col.y = -50;
                        col.speed = 1 + Math.random() * 3;
                        col.length = 8 + Math.random() * 15;
                    }

                    for (let i = 0; i < col.length; i++) {
                        const y = col.y - i * 15;
                        if (y < -20 || y > canvas.height + 20) continue;

                        const perspective = 1 + Math.sin(time * 0.001 + idx * 0.1) * 0.3;
                        const offsetX = (mouseX - canvas.width / 2) * (y / canvas.height) * 0.1;

                        const brightness = 1 - (i / col.length);
                        const g = Math.floor(255 * brightness);

                        ctx.fillStyle = `rgb(0, ${g}, ${Math.floor(65 * brightness)})`;
                        ctx.font = `${10 * perspective}px monospace`;
                        ctx.fillText(this.getChar(), col.x + offsetX, y);
                    }
                });

                ctx.strokeStyle = 'rgba(0, 255, 65, 0.06)';
                ctx.lineWidth = 1;
                const gridSize = 30;
                const offset = (time * 0.5) % gridSize;

                for (let x = 0; x < canvas.width; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x + (mouseX - canvas.width / 2) * 0.02, 0);
                    ctx.lineTo(x - (mouseX - canvas.width / 2) * 0.02, canvas.height);
                    ctx.stroke();
                }

                for (let y = offset; y < canvas.height; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y + (mouseY - canvas.height / 2) * 0.02);
                    ctx.lineTo(canvas.width, y - (mouseY - canvas.height / 2) * 0.02);
                    ctx.stroke();
                }

                ctx.font = '8px monospace';
                ctx.fillStyle = 'rgba(0, 255, 65, 0.08)';
                for (let i = 0; i < 15; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    const words = ['function', 'const', 'let', 'var', 'return', 'if', 'else', 'class'];
                    ctx.fillText(words[Math.floor(Math.random() * words.length)], x, y);
                }
            }
        }

        class EnergyMode {
            constructor() {
                this.rings = [];
                this.particles = [];
                this.init();
            }

            init() {
                for (let i = 0; i < 6; i++) {
                    this.rings.push({
                        radius: 40 + i * 45,
                        speed: 0.02 + Math.random() * 0.03,
                        phase: Math.random() * Math.PI * 2,
                        amplitude: 15 + Math.random() * 25
                    });
                }

                for (let i = 0; i < 60; i++) {
                    this.particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 2,
                        vy: (Math.random() - 0.5) * 2,
                        size: 1.5 + Math.random() * 3,
                        hue: 100 + Math.random() * 60
                    });
                }
            }

            draw() {
                ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const centerX = canvas.width / 2 + (mouseX - canvas.width / 2) * 0.1;
                const centerY = canvas.height / 2 + (mouseY - canvas.height / 2) * 0.1;

                this.rings.forEach((ring, idx) => {
                    ring.phase += ring.speed;

                    ctx.beginPath();
                    ctx.strokeStyle = `hsla(${100 + idx * 15}, 100%, 50%, 0.5)`;
                    ctx.lineWidth = 1.5;

                    for (let angle = 0; angle < Math.PI * 2; angle += 0.05) {
                        const r = ring.radius + Math.sin(angle * 3 + ring.phase) * ring.amplitude;
                        const x = centerX + Math.cos(angle) * r;
                        const y = centerY + Math.sin(angle) * r;

                        if (angle === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.closePath();
                    ctx.stroke();

                    ctx.shadowColor = `hsl(${100 + idx * 15}, 100%, 50%)`;
                    ctx.shadowBlur = 15;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                });

                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;

                    const dx = mouseX - p.x;
                    const dy = mouseY - p.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 200) {
                        p.vx += dx * 0.001;
                        p.vy += dy * 0.001;
                    }

                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;

                    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                    if (speed > 3) {
                        p.vx = (p.vx / speed) * 3;
                        p.vy = (p.vy / speed) * 3;
                    }

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, 0.7)`;
                    ctx.fill();

                    ctx.shadowColor = `hsl(${p.hue}, 100%, 50%)`;
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                for (let i = 0; i < this.particles.length; i++) {
                    for (let j = i + 1; j < this.particles.length; j++) {
                        const dx = this.particles[i].x - this.particles[j].x;
                        const dy = this.particles[i].y - this.particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 80) {
                            ctx.beginPath();
                            ctx.moveTo(this.particles[i].x, this.particles[i].y);
                            ctx.lineTo(this.particles[j].x, this.particles[j].y);
                            ctx.strokeStyle = `rgba(0, 255, 65, ${0.15 * (1 - dist / 80)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
            }
        }

        class DataMode {
            constructor() {
                this.streams = [];
                this.hexData = [];
                this.init();
            }

            init() {
                for (let i = 0; i < 15; i++) {
                    this.streams.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        width: 80 + Math.random() * 150,
                        speed: 1 + Math.random() * 2,
                        direction: Math.random() > 0.5 ? 1 : -1,
                        hue: 100 + Math.random() * 40
                    });
                }

                for (let i = 0; i < 35; i++) {
                    this.hexData.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        value: Math.floor(Math.random() * 65536).toString(16).toUpperCase().padStart(4, '0'),
                        speed: 0.5 + Math.random() * 1,
                        size: 10 + Math.random() * 6
                    });
                }
            }

            getRandomHex() {
                return Math.floor(Math.random() * 65536).toString(16).toUpperCase().padStart(4, '0');
            }

            draw() {
                ctx.fillStyle = 'rgba(10, 10, 10, 0.08)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const mouseInfluenceX = (mouseX - canvas.width / 2) * 0.02;
                const mouseInfluenceY = (mouseY - canvas.height / 2) * 0.02;

                this.streams.forEach((stream, idx) => {
                    stream.x += stream.speed * stream.direction;

                    if (stream.x > canvas.width + stream.width) {
                        stream.x = -stream.width;
                        stream.y = Math.random() * canvas.height;
                    }
                    if (stream.x < -stream.width) {
                        stream.x = canvas.width + stream.width;
                        stream.y = Math.random() * canvas.height;
                    }

                    const y = stream.y + mouseInfluenceY * (idx % 3);

                    ctx.beginPath();
                    ctx.moveTo(stream.x, y);
                    ctx.lineTo(stream.x + stream.width, y);
                    ctx.strokeStyle = `hsla(${100 + idx * 3}, 100%, 50%, 0.35)`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();

                    ctx.shadowColor = `hsl(${100 + idx * 3}, 100%, 50%)`;
                    ctx.shadowBlur = 10;
                    ctx.stroke();
                    ctx.shadowBlur = 0;

                    const packetCount = 4;
                    for (let i = 0; i < packetCount; i++) {
                        const packetX = stream.x + (stream.width / packetCount) * i + (time * 2) % (stream.width / packetCount);
                        const packetY = y + Math.sin(time * 0.05 + i + idx) * 8;

                        ctx.fillStyle = `hsla(${100 + idx * 3}, 100%, 70%, 0.8)`;
                        ctx.fillRect(packetX - 2, packetY - 2, 4, 4);
                    }
                });

                this.hexData.forEach((data, idx) => {
                    data.y -= data.speed;
                    if (data.y < -50) {
                        data.y = canvas.height + 50;
                        data.x = Math.random() * canvas.width;
                        data.value = this.getRandomHex();
                    }

                    const x = data.x + mouseInfluenceX * (idx % 5);
                    const y = data.y + mouseInfluenceY * (idx % 5);

                    ctx.font = `${data.size}px monospace`;
                    ctx.fillStyle = `hsla(${100 + idx * 2}, 100%, 60%, 0.7)`;
                    ctx.fillText(`0x${data.value}`, x, y);

                    ctx.shadowColor = `hsl(${100 + idx * 2}, 100%, 50%)`;
                    ctx.shadowBlur = 6;
                    ctx.fillText(`0x${data.value}`, x, y);
                    ctx.shadowBlur = 0;
                });

                const colWidth = canvas.width / 12;
                for (let i = 0; i < 12; i++) {
                    const x = i * colWidth + colWidth / 2;
                    const barHeight = 30 + Math.sin(time * 0.03 + i) * 25 + Math.abs(mouseY - canvas.height / 2) * 0.08;

                    ctx.fillStyle = `hsla(${100 + i * 3}, 100%, 50%, 0.25)`;
                    ctx.fillRect(x - 1.5, canvas.height - barHeight, 3, barHeight);

                    ctx.fillStyle = `hsla(${100 + i * 3}, 100%, 70%, 0.7)`;
                    ctx.fillRect(x - 0.5, canvas.height - barHeight, 1, barHeight);
                }

                const scanY = (time * 2) % canvas.height;
                ctx.strokeStyle = 'rgba(0, 255, 65, 0.25)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, scanY);
                ctx.lineTo(canvas.width, scanY);
                ctx.stroke();
            }
        }

        const matrixMode = new MatrixMode();
        const energyMode = new EnergyMode();
        const dataMode = new DataMode();

        function animate() {
            time++;

            switch (currentMode) {
                case 'matrix':
                    matrixMode.draw();
                    break;
                case 'energy':
                    energyMode.draw();
                    break;
                case 'data':
                    dataMode.draw();
                    break;
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
